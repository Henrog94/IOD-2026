<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
</head>

<body>

    <h1>HTML Form Example</h1>
<nav>
      <!-- works like <a href="/index.html">Home</a> -->
      <a href="index.html">Home</a>
      <a href="form.html">Form</a>
    </nav>
    <form method="POST" action="http://127.0.0.1:5500/form">

        <div>
            <label for="firstname">First Name:</label>
            <input type="text" id="firstname" name="firstname">
        </div>

        <br>

        <div>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lastname">
        </div>

        <br>

        <div>
            <p>Favorite Coding Language:</p>

            <input type="radio" id="html" name="language" value="HTML">
            <label for="html">HTML</label><br>

            <input type="radio" id="css" name="language" value="CSS">
            <label for="css">CSS</label><br>

            <input type="radio" id="javascript" name="language" value="JavaScript">
            <label for="javascript">JavaScript</label>
        </div>

        <br>

        <div>
            <p>Vehicles You Own:</p>

            <input type="checkbox" id="car" name="vehicle" value="Car">
            <label for="car">Car</label><br>

            <input type="checkbox" id="truck" name="vehicle" value="Truck">
            <label for="truck">Truck</label><br>

            <input type="checkbox" id="motorcycle" name="vehicle" value="Motorcycle">
            <label for="motorcycle">Motorcycle</label>
        </div>

        <br>

        <div>
            <label for="carbrand">Car Brand:</label>

            <select id="carbrand" name="carbrand">
                <option value="Toyota">Toyota</option>
                <option value="Honda">Honda</option>
                <option value="Ford">Ford</option>
            </select>
        </div>

        <br>

        <button type="submit">Submit Form</button>

    </form>

</body>
</html>
</body>
</html>

    <nav>
      <!-- works like <a href="/index.html">Home</a> -->
      <a href="/">Home</a>

</body>

</html>
