<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Generator</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        text-align:center;
        margin-top:50px;
    }

    .container{
        width:320px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px gray;
    }

    select,button{
        width:80%;
        padding:10px;
        margin:10px;
        font-size:16px;
    }

    #result{
        margin-top:20px;
        font-size:30px;
        font-weight:bold;
        color:blue;
    }
</style>

</head>
<body>

<div class="container">

<h2>Dice Generator</h2>

<label>Select Dice</label><br>

<select id="dice">
    <option value="4">D4</option>
    <option value="6" selected>D6</option>
    <option value="8">D8</option>
    <option value="10">D10</option>
    <option value="12">D12</option>
    <option value="20">D20</option>
</select>

<br>

<button onclick="rollSelectedDice()">Roll Dice</button>

<div id="result">
Roll the Dice!
</div>

</div>

<script>

// Reusable function
function rollDice(sides){

    return Math.floor(Math.random() * sides) + 1;

}

// Called when the button is clicked
function rollSelectedDice(){

    const sides = Number(document.getElementById("dice").value);

    const result = rollDice(sides);

    document.getElementById("result").innerHTML =
        "You rolled: " + result;

}


// ------------------------
// Unit Tests
// ------------------------

function testRollDice(){

    console.log("Running Unit Tests...");

    // Test D6 100 times
    for(let i=0;i<100;i++){

        let roll = rollDice(6);

        console.assert(
            roll >= 1 && roll <= 6,
            "D6 Test Failed"
        );
    }

    // Test D10 100 times
    for(let i=0;i<100;i++){

        let roll = rollDice(10);

        console.assert(
            roll >= 1 && roll <= 10,
            "D10 Test Failed"
        );
    }

    // Test D20 100 times
    for(let i=0;i<100;i++){

        let roll = rollDice(20);

        console.assert(
            roll >= 1 && roll <= 20,
            "D20 Test Failed"
        );
    }

    console.log("All Unit Tests Passed!");

}

// Run tests automatically when page loads
testRollDice();

</script>

</body>
</html>
